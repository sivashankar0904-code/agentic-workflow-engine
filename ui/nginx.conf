server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths resolve to index.html so client-side
    # routing (e.g. /registry/csv-flow) works on deep links and refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

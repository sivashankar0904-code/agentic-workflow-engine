# App services only. Kafka and Postgres already run in the external
# `local-docker_default` network and are reached by container name:
#
#   Kafka:    kafka:29092   (INTERNAL advertised listener)
#   Postgres: postgres:5432
#
# These services join that same network so DNS resolves the container names.

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      KAFKA_BROKER: kafka:29092
      DAG_DIR: /data/dags
      DAG_KEY: dag.yaml
    volumes:
      # Persist DAG YAML files on the host.
      - ./dags:/data/dags

# Join the pre-existing network that kafka / postgres run in.
networks:
  default:
    name: local-docker_default
    external: true

name: orchestrator

services:
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: orchestrator-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=300M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:29092
      - --advertise-kafka-addr=internal://kafka:9092,external://localhost:29092
    ports:
      - "29092:29092"
    volumes:
      - kafkadata:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: orchestrator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: controlplane
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schema files are applied on first init (empty data dir), in filename order.
      - ./control_plane/schemas:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d controlplane"]
      interval: 5s
      timeout: 3s
      retries: 5

  control_plane:
    build:
      context: ./control_plane
      dockerfile: Dockerfile
    container_name: control-plane-app
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/controlplane?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  orchestrator:
    build:
      context: ./service_orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CONTROL_PLANE_URL: http://control_plane:9000
      KAFKA_BROKER: kafka:9092
    depends_on:
      control_plane:
        condition: service_started
      kafka:
        condition: service_healthy

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: orchestrator-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - orchestrator
      - control_plane

volumes:
  pgdata:
  kafkadata:
